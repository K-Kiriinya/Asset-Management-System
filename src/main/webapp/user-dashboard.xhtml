<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
   
    <head>
        <title>User Dashboard</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
        <link rel="stylesheet" href="style.css" />
        
        <style>
            .toast-message {
                background: #e6f7e6;
                color: #2e7d32;
                border-left: 5px solid #2e7d32;
                padding: 12px 20px;
                border-radius: 8px;
                margin-bottom: 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .toast-message .close {
                cursor: pointer;
                font-size: 20px;
                font-weight: bold;
            }
        </style>
    </head>
    
    <body class="user-page">
        
        <div class="user-container">
           
            <div class="user-header">
                <div>
                    <h1 class="user-title">User Dashboard</h1>
                    <div class="user-subtitle">Asset Management System</div>
                </div>
                <div class="user-actions">
                    <div class="user-dropdown">
                        <button class="user-dropdown-btn" onclick="toggleUserDropdown()">
                            <i class="fas fa-user-circle"></i>  <!-- user icon -->
                        </button>
                        <div id="userDropdownContent" class="dropdown-content">
                            <div class="user-info">
                                <div><strong>Name:</strong> <span id="dropdownUsername"></span></div>
                                <div><strong>Email:</strong> <span id="dropdownEmail"></span></div>
                                <div><strong>Role:</strong> <span id="dropdownRole"></span></div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="#" onclick="openChangePasswordModal(); return false;">Change Password</a>
                            <a href="logout">Sign Out</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Change Password Modal -->
            <div id="changePasswordModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" onclick="closeChangePasswordModal()">&times;</span>
                    <h3>Change Password</h3>
                    <form id="changePasswordForm">
                        <div class="field">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" name="currentPassword" required="required" />
                        </div>
                        <div class="field">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" required="required" />
                        </div>
                        <div class="field">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required="required" />
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="btn-primary">Save</button>
                            <button type="button" class="btn-secondary" onclick="closeChangePasswordModal()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card-ui">
                <div class="panel-header">
                    <h2 class="panel-title">My Assets</h2>
                </div>
                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Asset Tag</th>
                                <th>Asset Name</th>
                                <th>Category</th>
                                <th>Date Assigned</th>
                                <th>Status</th>
                                <th>Notes</th>   
                            </tr>
                        </thead>
                        <tbody id="assetsTableBody">
                            <!-- Filled by JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div class="hint" style="margin-top: 14px;">
                    If an assigned asset is missing or incorrect, contact your administrator.
                </div>
            </div>
        </div>

        <script type="text/javascript">
            // <![CDATA[
            function showToast(message, isError) {
                alert(message);
            }

            // Toggle dropdown
            function toggleUserDropdown() {
                document.getElementById('userDropdownContent').classList.toggle('show');
            }

            // Close dropdown when clicking outside
            window.onclick = function(event) {
                if (!event.target.matches('.user-dropdown-btn') && !event.target.matches('.dropdown-arrow')) {
                    const dropdowns = document.getElementsByClassName('dropdown-content');
                    for (let i = 0; i < dropdowns.length; i++) {
                        const openDropdown = dropdowns[i];
                        if (openDropdown.classList.contains('show')) {
                            openDropdown.classList.remove('show');
                        }
                    }
                }
                // Also close modal if clicked outside
                const modal = document.getElementById('changePasswordModal');
                if (event.target === modal) {
                    closeChangePasswordModal();
                }
            };

            // Modal functions
            function openChangePasswordModal() {
                document.getElementById('changePasswordModal').style.display = 'block';
                toggleUserDropdown(); // close dropdown
            }

            function closeChangePasswordModal() {
                document.getElementById('changePasswordModal').style.display = 'none';
                document.getElementById('changePasswordForm').reset();
            }

            // Handle change password form
            document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const params = new URLSearchParams(formData);
                try {
                    const response = await fetch('changePassword', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params
                    });
                    const result = await response.json();
                    if (result.success) {
                        showToast(result.message || 'Password changed successfully');
                        closeChangePasswordModal();
                    } else {
                        showToast(result.message || 'Error changing password', true);
                    }
                } catch (error) {
                    showToast('Network error: ' + error.message, true);
                }
            });

            // Load user info
            async function loadUserInfo() {
                try {
                    const response = await fetch('api/user/info');
                    if (!response.ok) throw new Error('Failed to fetch user info');
                    const data = await response.json();

                    if (data.username) {
                        const displayName = data.fullName || data.username;
                        document.getElementById('dropdownUsername').innerText = displayName;
                        document.getElementById('dropdownEmail').innerText = data.email || '—';
                        document.getElementById('dropdownRole').innerText = data.role || '—';
                    } else {
                        window.location.href = 'login.xhtml';
                    }
                } catch (error) {
                    console.error('Error loading user info:', error);
                }
            }

            async function loadUserAssets() {
                try {
                    const response = await fetch('api/user/data');
                    
                    if (!response.ok) {
                        if (response.status === 401) {
                            window.location.href = 'login.xhtml';
                            return;
                        }
                        throw new Error('Failed to fetch data');
                    }
                    
                    const assets = await response.json();

                    const tbody = document.getElementById('assetsTableBody');
                    if (assets.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#667;padding:18px;">No assets assigned.</td></tr>`;
                        return;
                    }

                    let html = '';
                    assets.forEach(asset => {
                        html += `<tr>
                            <td>${escapeHtml(asset.assetTag)}</td>
                            <td>${escapeHtml(asset.assetName)}</td>
                            <td>${escapeHtml(asset.category)}</td>
                            <td>${asset.assignedAt}</td>
                            <td>${asset.status}</td>
                            <td>${escapeHtml(asset.notes) || ''}</td>
                        </tr>`;
                    });
                    tbody.innerHTML = html;
                } catch (error) {
                    console.error('Error loading assets:', error);
                    document.getElementById('assetsTableBody').innerHTML =
                        `<tr><td colspan="6" style="text-align:center;color:#c62828;padding:18px;">Error loading assets.</td></tr>`;
                }
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // Load both user info and assets on page load
            window.onload = function() {
                loadUserInfo();
                loadUserAssets();
            };
            // ]]>
        </script>
    </body>
</html>
