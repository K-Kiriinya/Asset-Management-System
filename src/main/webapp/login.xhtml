<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
    
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | AMS</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
        <link rel="stylesheet" type="text/css" href="style.css" />
    </head>
    
    <body style="position: relative;">
        <!-- Error toast container – outside card, floating above -->
        <div id="errorToast" class="error-toast" style="display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1100; width: 440px;">
            <span id="errorMessage"></span>
            <span class="close" onclick="this.parentElement.style.display='none'">&times;</span>
        </div>

        <div class="slider-container" id="sliderContainer">
            <div class="cards-wrapper">
                <!-- Login Card -->
                <div class="card-slide">
                    <h1>Asset Management System</h1>
                    <p class="subtitle">Enter your credentials to access your account</p>

                    <form action="login" method="post">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required="required" />
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Password</label>
                            
                            <div class="password-wrapper">
                                <input type="password" id="password" name="password" required="required" />
                                <i class="fas fa-lock lock-icon"></i>
                                <i class="far fa-eye eye-icon" id="togglePassword"></i>
                            </div>
                            
                            <div class="forgot-password-link">
                                <a href="#" onclick="showResetCard(); return false;">Forgot password?</a>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Sign in</button>
                    </form>

                    <div class="hint" style="margin-top: 20px;">
                        Contact your system administrator if you need access: admin@ams.co.ke
                    </div>
                </div>

                <!-- Reset Password Card -->
                <div class="card-slide">
                    <h1>Reset Password</h1>
                    <p class="subtitle">Enter your username to receive a reset link</p>

                    <div class="field">
                        <label for="resetUsername">Username</label>
                        <input type="text" id="resetUsername" name="resetUsername" placeholder="e.g., john" />
                    </div>

                    <div class="modal-actions" style="justify-content: space-between;">
                        <button class="btn-primary" onclick="requestReset()">Send Reset Link</button>
                        <button class="btn-secondary" onclick="showLoginCard()">Back</button>
                    </div>

                    <div id="resetResult" class="reset-result"></div>

                    <div class="back-to-login">
                        <a href="#" onclick="showLoginCard(); return false;">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            // <![CDATA[
            // Password visibility toggle (for login card)
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            if (togglePassword && password) {
                togglePassword.addEventListener('click', function() {
                    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                    password.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }

            // Show error message from URL (on login card)
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }

            const error = getQueryParam('error');
            if (error) {
                const toast = document.getElementById('errorToast');
                const msg = document.getElementById('errorMessage');
                if (error === 'missing') {
                    msg.innerText = 'Username and password are required.';
                } else if (error === 'invalid') {
                    msg.innerText = 'Invalid username or password.';
                } else {
                    msg.innerText = 'Login failed. Please try again.';
                }
                toast.style.display = 'flex';
            }

            // Card sliding functions
            function showResetCard() {
                document.getElementById('sliderContainer').classList.add('show-reset');
            }

            function showLoginCard() {
                document.getElementById('sliderContainer').classList.remove('show-reset');
                // Clear reset result and input when going back
                document.getElementById('resetResult').innerHTML = '';
                document.getElementById('resetUsername').value = '';
            }

            // Request reset (same as before)
            async function requestReset() {
                const username = document.getElementById('resetUsername').value.trim();
                if (!username) {
                    alert('Please enter your username');
                    return;
                }
                const params = new URLSearchParams();
                params.append('username', username);
                try {
                    const response = await fetch('request-reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params
                    });
                    const result = await response.json();
                    const resultDiv = document.getElementById('resetResult');
                    if (result.success) {
                        resultDiv.innerHTML = `<div class="reset-link-box">
                            <strong>Reset Link (click or copy):</strong><br>
                            <a href="${result.resetLink}" target="_blank">${result.resetLink}</a>
                        </div>`;
                    } else {
                        resultDiv.innerHTML = `<p style="color: red;">${result.message}</p>`;
                    }
                } catch (error) {
                    alert('Network error: ' + error.message);
                }
            }

            // Close error toast when clicking close
            window.closeError = function() {
                document.getElementById('errorToast').style.display = 'none';
            };
            // ]]>
        </script>
    </body>
</html>
